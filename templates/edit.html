<!doctype html>
<html>
  <head>
    <title>Edit Contact</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(to right, #2c3e50, #bdc3c7);
      }
    </style>
  </head>

  <body>
    <div class="container mt-5">
      <h2 class="text-center mb-4 fw-bold text-dark">
        <i class="bi bi-pencil-square"></i> Edit Contact
      </h2>

      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
              Update Contact Details
            </div>

            <div class="card-body">
              <form action="/update/{{ contact.id }}" method="post">
                <div class="mb-3">
                  <label class="form-label">First Name</label>
                  <input
                    type="text"
                    name="first"
                    value="{{ contact.first }}"
                    class="form-control form-control-sm"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Last Name</label>
                  <input
                    type="text"
                    name="last"
                    value="{{ contact.last }}"
                    class="form-control form-control-sm"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Address</label>
                  <input
                    type="text"
                    name="address"
                    value="{{ contact.address }}"
                    class="form-control form-control-sm"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input
                    type="email"
                    name="email"
                    value="{{ contact.email }}"
                    class="form-control form-control-sm"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Phone Number</label>
                  <input
                    type="text"
                    name="phone"
                    value="{{ contact.phone }}"
                    class="form-control form-control-sm"
                    required
                  />
                </div>

                <div class="text-center">
                  <button class="btn btn-dark px-4">Update</button>
                  <a href="/" class="btn btn-secondary ms-2">Back</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
